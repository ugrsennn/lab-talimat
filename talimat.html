<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Talimat</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --green:#1A3A2A;--green2:#2D6A4F;--green3:#52B788;
    --bg:#F4F1EC;--surface:#fff;--text:#1A1A1A;--text2:#4A5568;--text3:#718096;
    --border:#D4CCBB;
  }
  html,body{height:100%;font-family:'IBM Plex Sans',sans-serif;}

  /* LOADING */
  #loading{
    position:fixed;inset:0;background:var(--green);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    color:white;z-index:999;transition:opacity .4s;
  }
  #loading.hide{opacity:0;pointer-events:none;}
  .spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:16px;}
  @keyframes spin{to{transform:rotate(360deg)}}
  #loading p{font-size:14px;opacity:.7;}
  #loading h2{font-size:18px;font-weight:600;margin-bottom:6px;}

  /* ERROR STATE */
  #error-state{
    display:none;flex-direction:column;align-items:center;justify-content:center;
    height:100%;padding:32px;text-align:center;gap:16px;
    background:var(--bg);
  }
  #error-state .icon{font-size:48px;}
  #error-state h2{font-size:18px;font-weight:600;color:var(--green);}
  #error-state p{font-size:13px;color:var(--text2);line-height:1.6;max-width:320px;}

  /* HEADER */
  #app-header{
    background:var(--green);color:white;
    padding:12px 16px;
    display:none;
    align-items:center;gap:12px;
    position:sticky;top:0;z-index:10;
    border-bottom:2px solid var(--green3);
  }
  #app-header.show{display:flex;}
  .back-btn{background:rgba(255,255,255,.15);border:none;color:white;padding:6px 12px;border-radius:6px;font-family:'IBM Plex Sans',sans-serif;font-size:13px;cursor:pointer;}
  .back-btn:hover{background:rgba(255,255,255,.25);}
  .header-info{flex:1;overflow:hidden;}
  .header-info .title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .header-info .subtitle{font-size:11px;opacity:.65;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

  /* PDF VIEWER */
  #pdf-frame{
    display:none;width:100%;
    border:none;
  }
  #pdf-frame.show{display:block;}

  /* NO PDF — INFO CARD */
  #info-card{
    display:none;padding:24px 20px;background:var(--bg);min-height:calc(100vh - 60px);
  }
  #info-card.show{display:block;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:16px;}
  .card h3{font-size:13px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;}
  .instr-name{font-size:20px;font-weight:600;color:var(--green);line-height:1.3;}
  .badge{display:inline-block;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border-radius:4px;margin-top:8px;}
  .badge-deney{background:#EBF8FF;color:#2B6CB0;}
  .badge-cihaz{background:#FEFCBF;color:#744210;}
  .badge-guvenlik{background:#FFF5F5;color:#C53030;}
  .badge-prosedur{background:#F0FFF4;color:#276749;}
  .meta-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;}
  .meta-row:last-child{border-bottom:none;}
  .meta-label{color:var(--text3);}
  .meta-value{color:var(--text);font-weight:500;}
  .no-pdf-msg{text-align:center;padding:32px 20px;color:var(--text3);}
  .no-pdf-msg .icon{font-size:36px;margin-bottom:12px;}
  .no-pdf-msg p{font-size:13px;line-height:1.6;}
  .home-link{display:block;text-align:center;margin-top:16px;}
  .home-link a{color:var(--green2);font-size:13px;text-decoration:none;}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading">
  <div class="spinner"></div>
  <h2>Talimat Yükleniyor</h2>
  <p>Lütfen bekleyin...</p>
</div>

<!-- ERROR -->
<div id="error-state">
  <div class="icon">⚠️</div>
  <h2>Talimat Bulunamadı</h2>
  <p id="error-msg">Geçersiz veya eksik QR kodu. Lütfen QR kodu tekrar okutun.</p>
</div>

<!-- HEADER -->
<div id="app-header">
  <button class="back-btn" onclick="history.back()">← Geri</button>
  <div class="header-info">
    <div class="title" id="header-title">—</div>
    <div class="subtitle" id="header-sub">Laboratuvar Talimatı</div>
  </div>
</div>

<!-- PDF FRAME (full screen) -->
<iframe id="pdf-frame" allowfullscreen></iframe>

<!-- INFO CARD (when no PDF) -->
<div id="info-card"></div>

<script>
  function getParam(name){
    const u=new URLSearchParams(window.location.search);
    return u.get(name)||'';
  }

  function show(el){ el.classList.add('show'); }
  function hide(el){ el.classList.remove('show'); }

  window.addEventListener('DOMContentLoaded', function(){
    const id=getParam('id');
    const pdfPath=getParam('pdf');
    const name=decodeURIComponent(getParam('name')||'Talimat');
    const code=decodeURIComponent(getParam('code')||'');
    const group=decodeURIComponent(getParam('group')||'');
    const sub=decodeURIComponent(getParam('sub')||'');

    document.title = name || 'Talimat';

    if(!id){
      document.getElementById('loading').classList.add('hide');
      document.getElementById('error-state').style.display='flex';
      document.getElementById('error-msg').textContent='QR kodda talimat ID bilgisi bulunamadı.';
      return;
    }

    document.getElementById('header-title').textContent=name;
    document.getElementById('header-sub').textContent=[group,sub].filter(Boolean).join(' › ') || 'Laboratuvar Talimatı';
    show(document.getElementById('app-header'));

    if(pdfPath){
      // Build PDF URL relative to this page's location
      const base=window.location.href.replace(/\/talimat\.html.*$/,'');
      const pdfUrl=base+'/'+pdfPath;

      // Try loading PDF in iframe
      const frame=document.getElementById('pdf-frame');
      frame.style.height=(window.innerHeight - 58)+'px';
      frame.src=pdfUrl;

      frame.onload=function(){
        document.getElementById('loading').classList.add('hide');
        show(frame);
      };
      frame.onerror=function(){
        showInfoCard(id,name,code,group,sub,pdfPath,'PDF dosyası sunucuda bulunamadı.');
      };

      // Timeout fallback
      setTimeout(function(){
        if(!frame.classList.contains('show')){
          // Try direct link as fallback
          showInfoCard(id,name,code,group,sub,pdfPath,null);
        }
      },5000);

    } else {
      showInfoCard(id,name,code,group,sub,null,'Bu talimata henüz PDF dosyası eklenmemiş.');
    }
  });

  function showInfoCard(id,name,code,group,sub,pdfPath,errorMsg){
    document.getElementById('loading').classList.add('hide');
    const base=window.location.href.replace(/\/talimat\.html.*$/,'');
    const pdfUrl=pdfPath ? base+'/'+pdfPath : null;

    const card=document.getElementById('info-card');
    card.innerHTML=`
      <div class="card">
        <h3>Talimat Bilgileri</h3>
        <div class="instr-name">${name}</div>
        ${code?`<div class="badge badge-deney">${code}</div>`:''}
      </div>
      <div class="card">
        ${[
          group?['Grup',group]:null,
          sub?['Alt Grup',sub]:null,
          ['Talimat ID',id],
        ].filter(Boolean).map(([l,v])=>`<div class="meta-row"><span class="meta-label">${l}</span><span class="meta-value">${v}</span></div>`).join('')}
      </div>
      ${pdfUrl?`
        <div class="card" style="text-align:center;padding:24px;">
          <div style="font-size:32px;margin-bottom:12px">📄</div>
          <p style="font-size:14px;font-weight:500;margin-bottom:8px;">PDF Talimatı</p>
          ${errorMsg?`<p style="font-size:12px;color:#C53030;margin-bottom:12px;">${errorMsg}</p>`:''}
          <a href="${pdfUrl}" target="_blank"
            style="display:inline-block;background:#1A3A2A;color:white;padding:12px 24px;border-radius:8px;text-decoration:none;font-size:14px;font-weight:500;">
            📥 PDF'i Aç / İndir
          </a>
        </div>
      `:`
        <div class="card no-pdf-msg">
          <div class="icon">📭</div>
          <p>${errorMsg||'Bu talimata henüz PDF eklenmemiş.'}</p>
        </div>
      `}
      <div class="home-link"><a href="${base}/">← Tüm Talimatlar</a></div>
    `;
    show(card);
  }

  window.addEventListener('resize',function(){
    const frame=document.getElementById('pdf-frame');
    if(frame.classList.contains('show')) frame.style.height=(window.innerHeight-58)+'px';
  });
</script>
</body>
</html>
