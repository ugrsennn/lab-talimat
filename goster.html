<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Talimat</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:sans-serif;background:#1a1a2e;}
#bar{background:#1a1a2e;color:white;padding:10px 16px;display:flex;align-items:center;gap:10px;border-bottom:2px solid #4ade80;min-height:54px;}
#bar-ad{font-size:13px;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#bar-kod{font-size:10px;opacity:.55;}
iframe{display:block;width:100%;border:none;height:calc(100vh - 54px);}
#kart{display:none;padding:20px 16px;background:#f0f2f5;min-height:calc(100vh - 54px);}
.k{background:white;border-radius:10px;padding:16px;margin-bottom:12px;}
.k-ad{font-size:19px;font-weight:700;color:#1a1a2e;line-height:1.3;}
.k-kod{display:inline-block;margin-top:6px;font-size:11px;background:#f3f4f6;color:#374151;padding:3px 8px;border-radius:4px;font-weight:600;}
.btn{display:block;width:100%;background:#4ade80;color:#14532d;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:700;text-align:center;text-decoration:none;cursor:pointer;font-family:sans-serif;}
.btn:hover{background:#22c55e;}
.ana{display:block;text-align:center;margin-top:16px;color:#6b7280;font-size:12px;text-decoration:none;}
</style>
</head>
<body>
<div id="bar">
  <div style="flex:1;overflow:hidden">
    <div id="bar-ad">Talimat</div>
    <div id="bar-kod"></div>
  </div>
</div>
<iframe id="fr"></iframe>
<div id="kart"></div>
<script>
function p(n){return decodeURIComponent(new URLSearchParams(location.search).get(n)||'');}
const ad=p('ad'), pdf=p('pdf'), kod=p('kod');
const base=location.href.replace(/\/goster\.html.*/,'');
document.title=ad||'Talimat';
document.getElementById('bar-ad').textContent=ad||'Talimat';
if(kod) document.getElementById('bar-kod').textContent=kod+' · Laboratuvar Talimatı';

const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent);
const fr=document.getElementById('fr');
const kart=document.getElementById('kart');

if(pdf && !isIOS){
  fr.src=base+'/'+pdf;
} else {
  fr.style.display='none';
  kart.style.display='block';
  kart.innerHTML=`
    <div class="k">
      <div class="k-ad">${ad||'—'}</div>
      ${kod?`<span class="k-kod">${kod}</span>`:''}
    </div>
    ${pdf?`<div class="k" style="text-align:center">
      <a class="btn" href="${base+'/'+pdf}" target="_blank">📄 Talimatı Aç / İndir</a>
    </div>`:'<div class="k" style="color:#9ca3af;text-align:center;padding:32px">PDF henüz eklenmemiş.</div>'}
    <a class="ana" href="${base}/">← Tüm Talimatlar</a>`;
}
</script>
</body>
</html>
