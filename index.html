<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lab Talimatları</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Figtree',sans-serif;background:#f0f2f5;color:#1a1a2e;min-height:100vh;}

.topbar{background:#1a1a2e;color:white;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.logo{font-size:15px;font-weight:700;letter-spacing:.03em;}
.logo span{color:#4ade80;}
.topbar-right{display:flex;gap:8px;align-items:center;}
.tbtn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:white;padding:7px 14px;border-radius:8px;font-family:'Figtree',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:background .15s;text-decoration:none;display:flex;align-items:center;gap:5px;}
.tbtn:hover{background:rgba(255,255,255,.18);}
.tbtn-green{background:#4ade80;color:#14532d;border-color:#4ade80;}
.tbtn-green:hover{background:#22c55e;}

.container{max-width:960px;margin:0 auto;padding:28px 20px;}

.bilgi{background:#dbeafe;border:1px solid #93c5fd;border-radius:10px;padding:14px 18px;margin-bottom:24px;font-size:13px;color:#1e40af;line-height:1.7;}
.bilgi strong{font-weight:700;}
.bilgi code{background:#bfdbfe;padding:1px 5px;border-radius:3px;font-size:11px;font-family:monospace;}

.grup-blok{margin-bottom:32px;}
.grup-baslik{display:flex;align-items:center;gap:10px;margin-bottom:4px;}
.grup-baslik h2{font-size:13px;font-weight:700;color:#374151;text-transform:uppercase;letter-spacing:.08em;}
.grup-cizgi{flex:1;height:1px;background:#e5e7eb;}
.tur-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;}
.tur-deney{background:#dbeafe;color:#1d4ed8;}
.tur-cihaz{background:#fef9c3;color:#854d0e;}
.tur-guvenlik{background:#fee2e2;color:#b91c1c;}
.tur-prosedur{background:#dcfce7;color:#15803d;}

.altgrup-baslik{font-size:12px;font-weight:600;color:#6b7280;margin:16px 0 8px;padding-left:2px;}

.talimat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;}

.kart{background:white;border:1px solid #e5e7eb;border-radius:12px;padding:16px;display:flex;flex-direction:column;gap:12px;}
.kart-ust{}
.kart-ad{font-size:14px;font-weight:700;color:#1a1a2e;line-height:1.4;margin-bottom:4px;}
.kart-kod{font-size:11px;background:#f3f4f6;color:#374151;padding:2px 7px;border-radius:4px;display:inline-block;font-weight:600;}
.kart-pdf{font-size:11px;color:#9ca3af;margin-top:4px;}
.kart-pdf.var{color:#15803d;}

.kart-qr{display:flex;gap:10px;align-items:flex-start;}
.qr-wrap{background:white;border:1px solid #e5e7eb;border-radius:8px;padding:6px;flex-shrink:0;}
.qr-wrap canvas,.qr-wrap img{display:block;}
.kart-qr-right{display:flex;flex-direction:column;gap:6px;flex:1;}
.kart-url{font-family:monospace;font-size:9px;color:#9ca3af;word-break:break-all;line-height:1.5;background:#f9fafb;border-radius:4px;padding:4px 6px;}

.kart-btns{display:flex;gap:6px;flex-wrap:wrap;}
.kbtn{padding:6px 12px;border-radius:7px;font-family:'Figtree',sans-serif;font-size:12px;font-weight:600;cursor:pointer;border:1px solid transparent;display:flex;align-items:center;gap:4px;transition:all .15s;}
.kbtn-green{background:#4ade80;color:#14532d;border-color:#4ade80;}
.kbtn-green:hover{background:#22c55e;}
.kbtn-gray{background:#f3f4f6;color:#374151;border-color:#e5e7eb;}
.kbtn-gray:hover{background:#e5e7eb;}

.hata{background:#fee2e2;border:1px solid #fca5a5;border-radius:10px;padding:20px;text-align:center;color:#991b1b;font-size:14px;line-height:1.7;}

/* YAZDIR */
@media print {
  .topbar,.bilgi,.kart-url,.kbtn,.altgrup-baslik{display:none!important;}
  body{background:white;}
  .container{padding:0;}
  .grup-blok{margin-bottom:16px;}
  .talimat-grid{grid-template-columns:repeat(3,1fr);gap:8px;}
  .kart{border:1px solid #000;border-radius:6px;padding:10px;gap:8px;page-break-inside:avoid;}
  .kart-ad{font-size:11px;}
  .kart-kod{font-size:9px;}
  .qr-wrap{padding:4px;}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">LAB<span>TALİMAT</span></div>
  <div class="topbar-right">
    <a class="tbtn" href="https://github.com/ugrsennn/lab-talimat/edit/main/talimatlar.json" target="_blank">✏️ Talimat Düzenle</a>
    <button class="tbtn tbtn-green" onclick="window.print()">🖨 Tüm Etiketleri Yazdır</button>
  </div>
</div>

<div class="container">
  <div class="bilgi">
    <strong>Nasıl talimat eklerim?</strong> →
    Sağ üstteki <strong>✏️ Talimat Düzenle</strong> butonuna tıklayın →
    <code>talimatlar.json</code> dosyasını düzenleyin →
    <strong>Commit changes</strong> yapın → Sayfa otomatik güncellenir.<br>
    PDF'leri GitHub'a <code>pdfs/DOSYAADI.pdf</code> olarak yükleyin.
  </div>
  <div id="icerik">
    <div style="text-align:center;padding:60px;color:#9ca3af;font-size:14px;">Yükleniyor...</div>
  </div>
</div>

<script>
const BASE = 'https://ugrsennn.github.io/lab-talimat';

const turEmoji = { deney:'🧪', cihaz:'⚙️', guvenlik:'⚠️', prosedur:'📋' };
const turClass = { deney:'tur-deney', cihaz:'tur-cihaz', guvenlik:'tur-guvenlik', prosedur:'tur-prosedur' };

function getTalimatUrl(t) {
  return `${BASE}/goster.html?pdf=${encodeURIComponent('pdfs/'+t.pdf)}&ad=${encodeURIComponent(t.ad)}&kod=${encodeURIComponent(t.kod||'')}`;
}

async function yukle() {
  try {
    const r = await fetch('talimatlar.json?t=' + Date.now());
    if(!r.ok) throw new Error('JSON yüklenemedi');
    const veri = await r.json();
    render(veri);
  } catch(e) {
    document.getElementById('icerik').innerHTML = `
      <div class="hata">
        <strong>talimatlar.json yüklenemedi.</strong><br>
        Bu sayfayı GitHub Pages üzerinden açtığınızdan emin olun.<br>
        <small style="color:#b91c1c;font-size:12px">${e.message}</small>
      </div>`;
  }
}

function render(veri) {
  const ic = document.getElementById('icerik');
  let html = '';

  veri.gruplar.forEach(g => {
    const emoji = turEmoji[g.tur] || '📄';
    const cls = turClass[g.tur] || 'tur-prosedur';
    html += `<div class="grup-blok">
      <div class="grup-baslik">
        <span class="tur-badge ${cls}">${emoji} ${g.ad}</span>
        <div class="grup-cizgi"></div>
      </div>`;

    g.altgruplar.forEach(s => {
      html += `<div class="altgrup-baslik">📁 ${s.ad}</div>
        <div class="talimat-grid">`;
      s.talimatlar.forEach((t, i) => {
        const qrId = `qr-${g.ad}-${s.ad}-${i}`.replace(/\s+/g,'_').replace(/[^a-zA-Z0-9_]/g,'');
        const url = getTalimatUrl(t);
        html += `<div class="kart">
          <div class="kart-ust">
            <div class="kart-ad">${t.ad}</div>
            ${t.kod ? `<span class="kart-kod">${t.kod}</span>` : ''}
            <div class="kart-pdf ${t.pdf?'var':''}">
              ${t.pdf ? '✓ ' + t.pdf : '⚠️ PDF tanımlanmamış'}
            </div>
          </div>
          <div class="kart-qr">
            <div class="qr-wrap" id="${qrId}"></div>
            <div class="kart-qr-right">
              <div class="kart-url">${url}</div>
              <div class="kart-btns">
                <button class="kbtn kbtn-green" onclick="qrIndir('${qrId}','${t.kod||t.ad}')">⬇ İndir</button>
                <button class="kbtn kbtn-gray" onclick="tekEtiket('${qrId}','${t.ad}','${t.kod||''}','${g.ad}','${s.ad}')">🖨 Etiket</button>
              </div>
            </div>
          </div>
        </div>`;
      });
      html += '</div>';
    });
    html += '</div>';
  });

  ic.innerHTML = html;

  // Tüm QR'ları üret
  veri.gruplar.forEach(g => {
    g.altgruplar.forEach(s => {
      s.talimatlar.forEach((t, i) => {
        const qrId = `qr-${g.ad}-${s.ad}-${i}`.replace(/\s+/g,'_').replace(/[^a-zA-Z0-9_]/g,'');
        const el = document.getElementById(qrId);
        if(el) {
          new QRCode(el, {
            text: getTalimatUrl(t),
            width: 90, height: 90,
            colorDark: '#1a1a2e',
            colorLight: '#ffffff',
            correctLevel: QRCode.CorrectLevel.M
          });
        }
      });
    });
  });
}

function qrIndir(qrId, ad) {
  setTimeout(() => {
    const img = document.querySelector('#'+qrId+' img') || document.querySelector('#'+qrId+' canvas');
    if(!img) return;
    const a = document.createElement('a');
    a.download = 'QR_' + ad.replace(/\s+/g,'_') + '.png';
    a.href = img.src || img.toDataURL();
    a.click();
  }, 100);
}

function tekEtiket(qrId, ad, kod, grup, altgrup) {
  const img = document.querySelector('#'+qrId+' img');
  if(!img) return;
  const w = window.open('','_blank','width=500,height=350');
  w.document.write(`<!DOCTYPE html><html><head><meta charset=utf-8>
  <style>
    body{margin:0;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f0f2f5;font-family:sans-serif;}
    .etiket{width:9cm;border:1.5px solid #1a1a2e;border-radius:8px;padding:10px 12px;display:flex;align-items:center;gap:10px;background:white;}
    img{width:3cm;height:3cm;flex-shrink:0;}
    .bilgi{flex:1;overflow:hidden;}
    .ust{font-size:6.5pt;color:#9ca3af;text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;}
    .alt{font-size:6.5pt;color:#9ca3af;margin-bottom:6px;}
    .ad{font-size:9.5pt;font-weight:700;line-height:1.3;margin-bottom:4px;color:#1a1a2e;}
    .kd{font-size:7pt;background:#f3f4f6;padding:2px 5px;border-radius:3px;display:inline-block;font-weight:600;}
    .btn{display:block;margin-top:16px;text-align:center;}
    button{padding:10px 28px;background:#1a1a2e;color:white;border:none;border-radius:8px;font-size:14px;cursor:pointer;font-family:sans-serif;}
  </style></head><body>
  <div>
    <div class="etiket">
      <img src="${img.src}">
      <div class="bilgi">
        <div class="ust">${grup}</div>
        <div class="alt">${altgrup}</div>
        <div class="ad">${ad}</div>
        ${kod?`<span class="kd">${kod}</span>`:''}
      </div>
    </div>
    <div class="btn"><button onclick="window.print()">🖨 Yazdır</button></div>
  </div>
  </body></html>`);
  w.document.close();
}

yukle();
</script>
</body>
</html>
