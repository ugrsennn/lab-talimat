<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lab Talimat Yönetimi</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Figtree', sans-serif;
  background: #f0f2f5;
  color: #1a1a2e;
  min-height: 100vh;
}

/* ── TOPBAR ── */
.topbar {
  background: #1a1a2e;
  color: white;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  height: 56px;
  position: sticky;
  top: 0;
  z-index: 50;
}
.topbar-logo { font-size: 15px; font-weight: 700; letter-spacing: 0.03em; }
.topbar-logo span { color: #4ade80; }
.topbar-btn {
  background: #4ade80;
  color: #1a1a2e;
  border: none;
  padding: 8px 18px;
  border-radius: 8px;
  font-family: 'Figtree', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.15s;
}
.topbar-btn:hover { opacity: 0.85; }

/* ── LAYOUT ── */
.layout { display: flex; height: calc(100vh - 56px); }

/* ── SOL PANEL ── */
.panel {
  width: 280px;
  min-width: 280px;
  background: white;
  border-right: 1px solid #e5e7eb;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}
.panel-top {
  padding: 16px;
  border-bottom: 1px solid #e5e7eb;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.panel-top h2 { font-size: 11px; font-weight: 600; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.08em; }
.search {
  padding: 8px 12px;
  border: 1px solid #e5e7eb;
  border-radius: 8px;
  font-family: 'Figtree', sans-serif;
  font-size: 13px;
  width: 100%;
  outline: none;
}
.search:focus { border-color: #4ade80; }

.nav { padding: 8px; flex: 1; }

/* Grup */
.grp { margin-bottom: 2px; }
.grp-hd {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  color: #374151;
  user-select: none;
  transition: background 0.12s;
}
.grp-hd:hover { background: #f3f4f6; }
.grp-hd .arrow { margin-left: auto; font-size: 10px; transition: transform 0.18s; color: #9ca3af; }
.grp-hd.open .arrow { transform: rotate(90deg); }
.grp-icon { font-size: 14px; }

/* Alt grup */
.sub { padding-left: 10px; }
.sub-hd {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12.5px;
  color: #6b7280;
  user-select: none;
  transition: background 0.12s;
  border-left: 2px solid #e5e7eb;
  margin-left: 8px;
}
.sub-hd:hover { background: #f9fafb; color: #374151; }
.sub-hd .arrow { margin-left: auto; font-size: 9px; transition: transform 0.18s; color: #d1d5db; }
.sub-hd.open .arrow { transform: rotate(90deg); }

/* Talimat öğesi */
.items { padding-left: 10px; }
.item {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  color: #6b7280;
  border-left: 2px solid #e5e7eb;
  margin-left: 8px;
  transition: all 0.12s;
}
.item:hover { background: #f0fdf4; color: #15803d; border-left-color: #4ade80; }
.item.active { background: #f0fdf4; color: #15803d; font-weight: 600; border-left-color: #4ade80; }
.item-dot { width: 6px; height: 6px; border-radius: 50%; background: #d1d5db; flex-shrink: 0; }
.item.active .item-dot { background: #4ade80; }

/* Ekle butonları */
.add-row {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 5px 10px;
  border-radius: 6px;
  border: 1px dashed #d1d5db;
  background: none;
  color: #9ca3af;
  font-size: 11px;
  font-family: 'Figtree', sans-serif;
  cursor: pointer;
  width: 100%;
  margin-top: 4px;
  transition: all 0.12s;
}
.add-row:hover { border-color: #4ade80; color: #15803d; background: #f0fdf4; }

.panel-footer {
  padding: 12px 16px;
  border-top: 1px solid #e5e7eb;
  font-size: 11px;
  color: #9ca3af;
}

/* ── MAIN ── */
.main { flex: 1; overflow-y: auto; padding: 28px; }

/* Karşılama */
.welcome {
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  text-align: center;
  color: #9ca3af;
}
.welcome-icon { font-size: 52px; }
.welcome h2 { font-size: 18px; font-weight: 600; color: #6b7280; }
.welcome p { font-size: 13px; line-height: 1.6; max-width: 340px; }

/* Talimat sayfası */
.page { max-width: 760px; display: flex; flex-direction: column; gap: 16px; }

/* Kart */
.card {
  background: white;
  border: 1px solid #e5e7eb;
  border-radius: 12px;
  padding: 20px 24px;
}
.card-title {
  font-size: 11px;
  font-weight: 600;
  color: #9ca3af;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 14px;
}

/* Başlık kartı */
.instr-name { font-size: 22px; font-weight: 700; color: #1a1a2e; margin-bottom: 6px; }
.instr-path { font-size: 12px; color: #9ca3af; margin-bottom: 12px; }
.badge {
  display: inline-block;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 4px;
  margin-right: 6px;
}
.badge-deney { background: #dbeafe; color: #1d4ed8; }
.badge-cihaz { background: #fef9c3; color: #854d0e; }
.badge-guvenlik { background: #fee2e2; color: #b91c1c; }
.badge-prosedur { background: #dcfce7; color: #15803d; }
.instr-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px; }
.btn {
  padding: 8px 16px;
  border-radius: 8px;
  font-family: 'Figtree', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid transparent;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: all 0.15s;
}
.btn-green { background: #4ade80; color: #14532d; border-color: #4ade80; }
.btn-green:hover { background: #22c55e; }
.btn-gray { background: #f3f4f6; color: #374151; border-color: #e5e7eb; }
.btn-gray:hover { background: #e5e7eb; }
.btn-red { background: #fef2f2; color: #dc2626; border-color: #fecaca; }
.btn-red:hover { background: #fee2e2; }

/* PDF kartı */
.pdf-zone {
  border: 2px dashed #d1d5db;
  border-radius: 10px;
  padding: 28px;
  text-align: center;
  cursor: pointer;
  transition: all 0.15s;
  background: #fafafa;
}
.pdf-zone:hover, .pdf-zone.over { border-color: #4ade80; background: #f0fdf4; }
.pdf-zone p { font-size: 13px; color: #9ca3af; margin-top: 8px; }
.pdf-zone input { display: none; }
.pdf-file {
  display: flex;
  align-items: center;
  gap: 12px;
  background: #f9fafb;
  border: 1px solid #e5e7eb;
  border-radius: 8px;
  padding: 12px 14px;
}
.pdf-file-name { font-size: 13px; font-weight: 500; flex: 1; }
.pdf-file-size { font-size: 11px; color: #9ca3af; }
.pdf-remove { background: none; border: none; color: #dc2626; cursor: pointer; font-size: 16px; padding: 0 4px; }

.upload-tip {
  background: #f0fdf4;
  border: 1px solid #bbf7d0;
  border-radius: 8px;
  padding: 12px 14px;
  font-size: 12px;
  color: #15803d;
  line-height: 1.7;
  margin-top: 10px;
}
.upload-tip ol { padding-left: 16px; }
.upload-tip code { background: #dcfce7; padding: 1px 5px; border-radius: 3px; font-size: 11px; font-family: monospace; }

/* QR kartı */
.qr-wrap {
  display: flex;
  gap: 24px;
  align-items: flex-start;
  flex-wrap: wrap;
}
.qr-box {
  background: white;
  border: 1px solid #e5e7eb;
  border-radius: 10px;
  padding: 12px;
  display: inline-flex;
  flex-shrink: 0;
}
.qr-box canvas, .qr-box img { display: block; }
.qr-right { flex: 1; min-width: 200px; display: flex; flex-direction: column; gap: 10px; }
.qr-url {
  font-family: monospace;
  font-size: 11px;
  background: #f3f4f6;
  border: 1px solid #e5e7eb;
  border-radius: 6px;
  padding: 10px 12px;
  color: #374151;
  word-break: break-all;
  line-height: 1.6;
}
.qr-btns { display: flex; gap: 8px; flex-wrap: wrap; }
.no-qr {
  background: #fffbeb;
  border: 1px solid #fde68a;
  border-radius: 8px;
  padding: 14px;
  font-size: 13px;
  color: #92400e;
}

/* ── MODAL ── */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 200;
  align-items: center;
  justify-content: center;
}
.overlay.show { display: flex; }
.modal {
  background: white;
  border-radius: 14px;
  padding: 28px;
  width: 440px;
  max-width: 92vw;
  box-shadow: 0 25px 50px rgba(0,0,0,0.15);
}
.modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 20px; color: #1a1a2e; }
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 12px; font-weight: 600; color: #6b7280; margin-bottom: 5px; }
.field input, .field select {
  width: 100%;
  padding: 9px 12px;
  border: 1px solid #e5e7eb;
  border-radius: 8px;
  font-family: 'Figtree', sans-serif;
  font-size: 13px;
  color: #1a1a2e;
  outline: none;
}
.field input:focus, .field select:focus { border-color: #4ade80; }
.modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

/* ── BASKI ETİKET ── */
@media print {
  body * { visibility: hidden !important; }
  #print-area, #print-area * { visibility: visible !important; }
  #print-area { position: fixed; inset: 0; display: flex; flex-wrap: wrap; align-content: flex-start; gap: 0; background: white; }
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">LAB<span>TALİMAT</span></div>
  <button class="topbar-btn" onclick="openModal('grup')">+ Grup Ekle</button>
</div>

<div class="layout">

  <!-- SOL PANEL -->
  <div class="panel">
    <div class="panel-top">
      <h2>Talimatlar</h2>
      <input class="search" type="text" placeholder="Ara..." oninput="ara(this.value)">
    </div>
    <div class="nav" id="nav"></div>
    <div class="panel-footer" id="panel-stat">0 talimat</div>
  </div>

  <!-- ANA ALAN -->
  <div class="main" id="main">
    <div class="welcome">
      <div class="welcome-icon">🔬</div>
      <h2>Lab Talimat Sistemi</h2>
      <p>Soldan bir talimat seçin ya da yeni grup oluşturun. PDF yükleyin, QR etiket basın.</p>
    </div>
  </div>

</div>

<!-- MODALLER -->
<div class="overlay" id="ov-grup">
  <div class="modal">
    <h3>Yeni Grup</h3>
    <div class="field"><label>Grup Adı</label><input id="g-ad" placeholder="örn. Deney Talimatları"></div>
    <div class="field"><label>Tür</label>
      <select id="g-tur">
        <option value="deney">🧪 Deney Talimatları</option>
        <option value="cihaz">⚙️ Cihaz Kullanma Talimatları</option>
        <option value="guvenlik">⚠️ Güvenlik Talimatları</option>
        <option value="prosedur">📋 Prosedür Talimatları</option>
      </select>
    </div>
    <div class="modal-btns">
      <button class="btn btn-gray" onclick="kapat('grup')">İptal</button>
      <button class="btn btn-green" onclick="grupEkle()">Ekle</button>
    </div>
  </div>
</div>

<div class="overlay" id="ov-alt">
  <div class="modal">
    <h3>Alt Grup Ekle</h3>
    <div class="field"><label>Ana Grup</label><select id="a-parent"></select></div>
    <div class="field"><label>Alt Grup Adı</label><input id="a-ad" placeholder="örn. Seramik Yapıştırıcıları"></div>
    <div class="modal-btns">
      <button class="btn btn-gray" onclick="kapat('alt')">İptal</button>
      <button class="btn btn-green" onclick="altEkle()">Ekle</button>
    </div>
  </div>
</div>

<div class="overlay" id="ov-tal">
  <div class="modal">
    <h3>Talimat Ekle</h3>
    <div class="field"><label>Alt Grup</label><select id="t-alt"></select></div>
    <div class="field"><label>Talimat Adı</label><input id="t-ad" placeholder="örn. Seramik Yapıştırıcı Hazırlama"></div>
    <div class="field"><label>Doküman No <span style="font-weight:400;color:#9ca3af">(opsiyonel)</span></label><input id="t-kod" placeholder="örn. TL0348"></div>
    <div class="modal-btns">
      <button class="btn btn-gray" onclick="kapat('tal')">İptal</button>
      <button class="btn btn-green" onclick="talEkle()">Ekle</button>
    </div>
  </div>
</div>

<!-- GİZLİ YAZDIR ALANI -->
<div id="print-area" style="display:none"></div>

<script>
const BASE = 'https://ugrsennn.github.io/lab-talimat';

/* ── VERİ ── */
let veri = { gruplar: [] };
let acikGruplar = new Set();
let acikAltlar = new Set();
let secili = null; // { gid, sid, iid }

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

function kaydet() { localStorage.setItem('labv3', JSON.stringify(veri)); }
function yukle() {
  try { const d = localStorage.getItem('labv3'); if(d) veri = JSON.parse(d); } catch(e) {}
}

function talimatiDosyaAdiYap(ad) {
  return ad.toLowerCase()
    .replace(/\s+/g, '-')
    .replace(/[^a-z0-9\-]/g, '')
    .replace(/-+/g, '-')
    .replace(/^-|-$/g, '') + '.pdf';
}

function getTalimatUrl(tal) {
  const pdfPath = tal.pdfDosya ? `pdfs/${tal.pdfDosya}` : '';
  return `${BASE}/goster.html?id=${tal.id}&pdf=${encodeURIComponent(pdfPath)}&ad=${encodeURIComponent(tal.ad)}${tal.kod?'&kod='+encodeURIComponent(tal.kod):''}`;
}

/* ── NAVİGASYON ── */
function navCiz(filtre) {
  const fl = (filtre||'').toLowerCase();
  const nav = document.getElementById('nav');
  let html = '';
  let toplamTal = 0;

  veri.gruplar.forEach(g => {
    const info = turBilgi(g.tur);
    const acikG = acikGruplar.has(g.id);
    let altHtml = '';
    let gGoster = !fl;

    g.altlar.forEach(s => {
      let itemHtml = '';
      let sGoster = !fl;
      s.talimatlar.forEach(t => {
        toplamTal++;
        if(fl && !t.ad.toLowerCase().includes(fl) && !s.ad.toLowerCase().includes(fl) && !g.ad.toLowerCase().includes(fl)) return;
        gGoster = sGoster = true;
        const act = secili && secili.iid === t.id ? 'active' : '';
        itemHtml += `<div class="item ${act}" onclick="sec('${g.id}','${s.id}','${t.id}')">
          <div class="item-dot"></div>
          <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.ad}</span>
        </div>`;
      });
      if(!fl || sGoster) {
        gGoster = true;
        const acikS = acikAltlar.has(s.id);
        altHtml += `<div class="sub">
          <div class="sub-hd ${acikS?'open':''}" onclick="toggleAlt('${s.id}')">
            <span>📁</span><span style="flex:1">${s.ad}</span>
            <span style="font-size:10px;background:#f3f4f6;padding:1px 5px;border-radius:8px;color:#9ca3af">${s.talimatlar.length}</span>
            <span class="arrow">›</span>
          </div>
          <div class="items" style="display:${acikS?'block':'none'}">
            ${itemHtml}
            <button class="add-row" onclick="openModal('tal')" style="margin-left:8px">＋ Talimat ekle</button>
          </div>
        </div>`;
      }
    });

    if(!fl || gGoster) {
      html += `<div class="grp">
        <div class="grp-hd ${acikG?'open':''}" onclick="toggleGrup('${g.id}')">
          <span class="grp-icon">${info.emoji}</span>
          <span style="flex:1">${g.ad}</span>
          <span class="arrow">›</span>
        </div>
        <div style="display:${acikG?'block':'none'}">
          ${altHtml}
          <button class="add-row" onclick="openModal('alt')" style="margin-left:6px">＋ Alt grup ekle</button>
        </div>
      </div>`;
    }
  });

  nav.innerHTML = html || '<p style="padding:16px;font-size:12px;color:#9ca3af">Sonuç yok.</p>';
  document.getElementById('panel-stat').textContent = `${toplamTal} talimat · ${veri.gruplar.length} grup`;
}

function toggleGrup(id) { acikGruplar.has(id) ? acikGruplar.delete(id) : acikGruplar.add(id); navCiz(); }
function toggleAlt(id) { acikAltlar.has(id) ? acikAltlar.delete(id) : acikAltlar.add(id); navCiz(); }
function ara(v) { navCiz(v); }

/* ── SEÇİM VE GÖRÜNTÜLEME ── */
function sec(gid, sid, iid) {
  secili = { gid, sid, iid };
  navCiz();
  sayfaGoster();
}

function bulTalimat() {
  if(!secili) return null;
  const g = veri.gruplar.find(g=>g.id===secili.gid);
  if(!g) return null;
  const s = g.altlar.find(s=>s.id===secili.sid);
  if(!s) return null;
  const t = s.talimatlar.find(t=>t.id===secili.iid);
  if(!t) return null;
  return { g, s, t };
}

function sayfaGoster() {
  const b = bulTalimat();
  if(!b) { gosterKarsılama(); return; }
  const { g, s, t } = b;
  const info = turBilgi(g.tur);
  const url = getTalimatUrl(t);
  const main = document.getElementById('main');

  main.innerHTML = `<div class="page">

    <!-- BAŞLIK -->
    <div class="card">
      <div class="instr-path">${g.ad} › ${s.ad}</div>
      <div class="instr-name">${t.ad}</div>
      <span class="badge badge-${g.tur}">${info.emoji} ${info.label}</span>
      ${t.kod ? `<span class="badge" style="background:#f3f4f6;color:#374151">${t.kod}</span>` : ''}
      <div class="instr-actions">
        <button class="btn btn-red" onclick="talSil('${t.id}')">🗑 Sil</button>
      </div>
    </div>

    <!-- PDF -->
    <div class="card">
      <div class="card-title">📎 PDF Talimat Dosyası</div>
      ${t.pdfDosya ? `
        <div class="pdf-file">
          <span style="font-size:24px">📕</span>
          <div style="flex:1">
            <div class="pdf-file-name">${t.pdfDosya}</div>
            <div class="pdf-file-size">pdfs/ klasörüne yükleyin</div>
          </div>
          <button class="pdf-remove" onclick="pdfKaldir('${t.id}')" title="Kaldır">✕</button>
        </div>
      ` : `
        <div class="pdf-zone" id="dropzone" onclick="document.getElementById('pdfInput').click()"
          ondragover="event.preventDefault();this.classList.add('over')"
          ondragleave="this.classList.remove('over')"
          ondrop="pdfBirak(event,'${t.id}')">
          <div style="font-size:32px">📄</div>
          <strong style="font-size:14px;color:#374151">PDF seç veya sürükle</strong>
          <p>Dosya adı otomatik ayarlanır</p>
          <input type="file" id="pdfInput" accept=".pdf" onchange="pdfSec(event,'${t.id}')">
        </div>
      `}
      <div class="upload-tip">
        <strong>GitHub'a nasıl yüklenir?</strong><br>
        <ol>
          <li>github.com/ugrsennn/lab-talimat adresine gidin</li>
          <li><strong>Add file → Upload files</strong> tıklayın</li>
          <li>Dosya adını <code>pdfs/${t.pdfDosya || t.ad.toLowerCase().replace(/\s+/g,'-')+'.pdf'}</code> yapın</li>
          <li><strong>Commit changes</strong> → bitti ✓</li>
        </ol>
      </div>
    </div>

    <!-- QR -->
    <div class="card">
      <div class="card-title">📱 QR Kod — Telefon ile Okut</div>
      <div class="qr-wrap">
        <div class="qr-box" id="qr-box"></div>
        <div class="qr-right">
          <div class="qr-url">${url}</div>
          <p style="font-size:12px;color:#6b7280;line-height:1.6">Telefon kamerası bu adresi açar. PDF GitHub'da <code style="background:#f3f4f6;padding:1px 4px;border-radius:3px;font-size:11px;font-family:monospace">pdfs/</code> klasöründe olmalı.</p>
          <div class="qr-btns">
            <button class="btn btn-green" onclick="qrIndir()">⬇ QR İndir</button>
            <button class="btn btn-gray" onclick="etiketYazdir()">🖨 Etiket Yazdır</button>
          </div>
        </div>
      </div>
    </div>

  </div>`;

  // QR üret
  setTimeout(() => {
    const box = document.getElementById('qr-box');
    if(box) {
      box.innerHTML = '';
      new QRCode(box, {
        text: url,
        width: 180, height: 180,
        colorDark: '#1a1a2e',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.M
      });
    }
  }, 50);
}

function gosterKarsılama() {
  secili = null;
  document.getElementById('main').innerHTML = `<div class="welcome">
    <div class="welcome-icon">🔬</div>
    <h2>Lab Talimat Sistemi</h2>
    <p>Soldan bir talimat seçin ya da yeni grup oluşturun.</p>
  </div>`;
}

/* ── PDF ── */
function pdfSec(e, tid) {
  const f = e.target.files[0];
  if(f) pdfAta(f, tid);
}
function pdfBirak(e, tid) {
  e.preventDefault();
  document.getElementById('dropzone')?.classList.remove('over');
  const f = e.dataTransfer.files[0];
  if(f && f.type==='application/pdf') pdfAta(f, tid);
}
function pdfAta(f, tid) {
  const dosyaAd = f.name;
  veri.gruplar.forEach(g => g.altlar.forEach(s => s.talimatlar.forEach(t => {
    if(t.id === tid) t.pdfDosya = dosyaAd;
  })));
  kaydet(); sayfaGoster();
}
function pdfKaldir(tid) {
  if(!confirm('PDF dosya adını kaldır?')) return;
  veri.gruplar.forEach(g => g.altlar.forEach(s => s.talimatlar.forEach(t => {
    if(t.id === tid) t.pdfDosya = null;
  })));
  kaydet(); sayfaGoster();
}

/* ── QR İNDİR ── */
function qrIndir() {
  const b = bulTalimat();
  if(!b) return;
  setTimeout(() => {
    const img = document.querySelector('#qr-box img') || document.querySelector('#qr-box canvas');
    if(!img) return;
    const src = img.src || img.toDataURL();
    const a = document.createElement('a');
    a.download = `QR_${b.t.kod||b.t.id}.png`;
    a.href = src; a.click();
  }, 100);
}

/* ── ETİKET YAZDIR ── */
function etiketYazdir() {
  const b = bulTalimat();
  if(!b) return;
  const img = document.querySelector('#qr-box img');
  if(!img) { alert('QR kodu oluşturuluyor, bir saniye bekleyin.'); return; }

  const alan = document.getElementById('print-area');
  alan.style.display = 'flex';
  alan.innerHTML = `
    <div style="width:9cm;height:5cm;border:1px solid #000;padding:8px;display:flex;align-items:center;gap:10px;font-family:sans-serif;break-inside:avoid;page-break-inside:avoid">
      <img src="${img.src}" style="width:3.2cm;height:3.2cm;flex-shrink:0">
      <div style="flex:1;overflow:hidden">
        <div style="font-size:7pt;color:#666;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px">${b.g.ad}</div>
        <div style="font-size:7pt;color:#888;margin-bottom:5px">${b.s.ad}</div>
        <div style="font-size:9pt;font-weight:700;line-height:1.3;margin-bottom:4px">${b.t.ad}</div>
        ${b.t.kod ? `<div style="font-size:7pt;background:#f3f4f6;display:inline-block;padding:2px 5px;border-radius:3px">${b.t.kod}</div>` : ''}
        <div style="font-size:6pt;color:#aaa;margin-top:6px;word-break:break-all">${getTalimatUrl(b.t).replace('https://','')}</div>
      </div>
    </div>`;

  window.print();
  setTimeout(() => { alan.style.display = 'none'; alan.innerHTML = ''; }, 1000);
}

/* ── CRUD ── */
function grupEkle() {
  const ad = document.getElementById('g-ad').value.trim();
  const tur = document.getElementById('g-tur').value;
  if(!ad) return;
  const g = { id: uid(), ad, tur, altlar: [] };
  veri.gruplar.push(g);
  acikGruplar.add(g.id);
  kaydet(); navCiz(); kapat('grup');
  document.getElementById('g-ad').value = '';
}

function altEkle() {
  const pid = document.getElementById('a-parent').value;
  const ad = document.getElementById('a-ad').value.trim();
  if(!ad) return;
  const g = veri.gruplar.find(g=>g.id===pid);
  if(g) { const s = {id:uid(),ad,talimatlar:[]}; g.altlar.push(s); acikAltlar.add(s.id); }
  kaydet(); navCiz(); kapat('alt');
  document.getElementById('a-ad').value = '';
}

function talEkle() {
  const sid = document.getElementById('t-alt').value;
  const ad = document.getElementById('t-ad').value.trim();
  const kod = document.getElementById('t-kod').value.trim();
  if(!ad) return;
  let bulundu = false;
  veri.gruplar.forEach(g => g.altlar.forEach(s => {
    if(s.id===sid && !bulundu) {
      s.talimatlar.push({ id:uid(), ad, kod, pdfDosya: null });
      bulundu = true;
    }
  }));
  kaydet(); navCiz(); kapat('tal');
  ['t-ad','t-kod'].forEach(id => document.getElementById(id).value = '');
}

function talSil(tid) {
  if(!confirm('Bu talimatı sil?')) return;
  veri.gruplar.forEach(g => g.altlar.forEach(s => {
    s.talimatlar = s.talimatlar.filter(t=>t.id!==tid);
  }));
  secili = null;
  kaydet(); navCiz(); gosterKarsılama();
}

/* ── MODAL ── */
function openModal(tip) {
  if(tip==='alt') {
    document.getElementById('a-parent').innerHTML =
      veri.gruplar.map(g=>`<option value="${g.id}">${turBilgi(g.tur).emoji} ${g.ad}</option>`).join('');
  }
  if(tip==='tal') {
    const opts = [];
    veri.gruplar.forEach(g => g.altlar.forEach(s =>
      opts.push(`<option value="${s.id}">[${g.ad}] ${s.ad}</option>`)
    ));
    document.getElementById('t-alt').innerHTML = opts.join('');
  }
  document.getElementById(`ov-${tip}`).classList.add('show');
  setTimeout(()=>{ const i=document.querySelector(`#ov-${tip} input`); if(i) i.focus(); },100);
}
function kapat(tip) { document.getElementById(`ov-${tip}`).classList.remove('show'); }
document.querySelectorAll('.overlay').forEach(o=>o.addEventListener('click',e=>{ if(e.target===o) o.classList.remove('show'); }));

/* ── YARDIMCI ── */
function turBilgi(tur) {
  return {
    deney:    { emoji:'🧪', label:'Deney' },
    cihaz:    { emoji:'⚙️', label:'Cihaz' },
    guvenlik: { emoji:'⚠️', label:'Güvenlik' },
    prosedur: { emoji:'📋', label:'Prosedür' },
  }[tur] || { emoji:'📄', label:'Talimat' };
}

/* ── BAŞLAT ── */
yukle();

// Örnek veri yoksa ekle
if(veri.gruplar.length === 0) {
  const g1 = uid(), g2 = uid(), s1 = uid(), s2 = uid(), s3 = uid();
  veri.gruplar = [
    { id:g1, ad:'Deney Talimatları', tur:'deney', altlar:[
      { id:s1, ad:'Seramik Yapıştırıcıları', talimatlar:[
        { id:uid(), ad:'Derz Dolgularda Aşınma Direnci Tayini', kod:'TL0348', pdfDosya:'TL0348-asınma-direnci.pdf' },
        { id:uid(), ad:'Seramik Yapıştırıcı Hazırlama', kod:'TL0201', pdfDosya:null },
      ]},
      { id:s2, ad:'Kimyasal Analizler', talimatlar:[
        { id:uid(), ad:'pH Ölçüm Talimatı', kod:'TL0102', pdfDosya:null },
      ]},
    ]},
    { id:g2, ad:'Cihaz Kullanma Talimatları', tur:'cihaz', altlar:[
      { id:s3, ad:'Analitik Teraziler', talimatlar:[
        { id:uid(), ad:'Terazi Kalibrasyon Talimatı', kod:'CT-001', pdfDosya:null },
      ]},
    ]},
  ];
  acikGruplar.add(g1); acikGruplar.add(g2);
  acikAltlar.add(s1); acikAltlar.add(s3);
  kaydet();
}

navCiz();
</script>
